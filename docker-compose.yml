services:
  server:
    build:
      context: .
      dockerfile: apps/server/Dockerfile
    environment:
      PORT: 8080
      DATABASE_PATH: /app/data/bubble-craps.sqlite
      BETTING_COUNTDOWN_SECONDS: 10
      STARTING_BALANCE: 1000
      SIMULATED_ROLL_DELAY_MS: 900
      REBUY_CHIPS: 2000
      ROLL_TIMEOUT_SECONDS: 30
      AUTH_MODE: local
    volumes:
      - ./data:/app/data
    ports:
      - "8080:8080"

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    environment:
      VITE_WS_URL: ws://localhost:8080/ws
      VITE_AUTH_MODE: local
      VITE_REBUY_CHIPS: 2000
    ports:
      - "5173:5173"
    depends_on:
      - server
